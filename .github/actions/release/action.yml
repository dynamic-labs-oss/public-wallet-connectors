name: Release
description: Bumps the version of the project and opens a PR
inputs:
  type:
    description: The action to perform
    type: choice
    required: true
    options:
      - bump
      - publish
  ref:
    description: Branch or commit to publish. The ref must be a chore(release) commit
    default: main
  version: # determines what node version to install
    required: false
    description: node js version
    default: 20
  preId:
    description: The prerelease name (Only required if using a bump starting with `pre`)
    default: alpha
  bump:
    description: Increment a version by the specified level
    type: choice
    default: prerelease
    options:
      - major
      - minor
      - patch
      - premajor
      - preminor
      - prepatch
      - prerelease

outputs:
  version:
    value: ${{ steps.bumpversion.outputs.version}}
  major:
    value: ${{ steps.bumpversion.outputs.major}}

runs:
  using: composite
  steps:
    - name: Checkout ${{ inputs.ref }}
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref }}
        fetch-depth: 0
        path: ${{ github.workspace }}
    - name: Setup Node
      uses: dynamic-labs-oss/public-wallet-connectors/.github/actions/setup-node@main
      with:
        version: ${{ inputs.version }}
    - name: Install Packages for Github Action
      shell: bash
      run: |-
        pushd ${GITHUB_ACTION_PATH};
          pnpm install --ignore-workspace
        popd
    - name: Get Release Commit
      if: "${{ inputs.type == 'publish' }}"
      id: releasecommits
      shell: bash
      run: |-
        ${GITHUB_ACTION_PATH}/node_modules/.bin/tsx \
        ${GITHUB_ACTION_PATH}/src/commands/get-release-commit.ts
    - name: Checkout Release Commit (${{ steps.commit.outputs.sha }})
      if: "${{ inputs.type == 'publish' }}"
      uses: actions/checkout@v4
      with:
        ref: ${{ steps.releasecommits.outputs.toSha }}
        fetch-depth: 1
        clean: true
    - uses: nrwl/nx-set-shas@v4
    - name: Install Packages for Release Commit
      if: "${{ inputs.type == 'publish' }}"
      shell: bash
      run: |-
        pnpm install --frozen-lockfile --strict-peer-dependencies
        pnpm nx reset
    - name: Set git identity
      shell: bash
      run: |-
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
    - name: Create Release and Detect Dist Tag
      if: "${{ inputs.type == 'publish' }}"
      id: createrelease
      shell: bash
      env:
        NX_BASE:
        NX_HEAD:
      run: |-
        NX_VERBOSE_LOGGING=true DEBUG=* ${GITHUB_ACTION_PATH}/node_modules/.bin/tsx \
        ${GITHUB_ACTION_PATH}/src/commands/publish-packages.ts \
          --dryRun=false \
          --createRelease=true \
          --toSha=${{ steps.releasecommits.outputs.toSha }} \
          --fromSha=${{ steps.releasecommits.outputs.fromSha }} \
          --workspaceVersion=${{ steps.releasecommits.outputs.version }} \
          --verbose
    - name: Build Packages
      if: "${{ inputs.type == 'publish' }}"
      shell: bash
      run: |-
        pnpm exec nx run-many --target=build --projects="@dynamic-labs-connectors/*"
    - name: Upgrade npm for OIDC Trusted Publishing
      # npm's Trusted Publishing (OIDC) support was stabilized in npm 11.5.1.
      # Node 20 ships with npm ~10.8, so we upgrade before calling `npm publish`.
      if: "${{ inputs.type == 'publish' }}"
      shell: bash
      run: |-
        npm install -g npm@latest
        echo "npm: $(npm --version)"
    - name: Publish Packages to npm
      if: "${{ inputs.type == 'publish' }}"
      shell: bash
      env:
        DIST_TAG: ${{ steps.createrelease.outputs.distTag }}
      run: |-
        set -eo pipefail
        if [ -z "$DIST_TAG" ]; then
          echo "::error::distTag output was not set by the Create Release step"
          exit 1
        fi
        echo "Publishing with dist-tag: $DIST_TAG"

        FAILED=()
        SKIPPED=()
        PUBLISHED=()

        for pkg_dir in dist/packages/@dynamic-labs-connectors/*/; do
          [ -d "$pkg_dir" ] || continue
          [ -f "$pkg_dir/package.json" ] || continue

          PACKAGE_NAME=$(node -p "require('./${pkg_dir}package.json').name")
          PACKAGE_VERSION=$(node -p "require('./${pkg_dir}package.json').version")

          echo "::group::${PACKAGE_NAME}@${PACKAGE_VERSION}"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "Already published, skipping"
            SKIPPED+=("${PACKAGE_NAME}@${PACKAGE_VERSION}")
            echo "::endgroup::"
            continue
          fi

          echo "Publishing ${PACKAGE_NAME}@${PACKAGE_VERSION}"
          if (cd "$pkg_dir" && npm publish --tag "$DIST_TAG" --registry=https://registry.npmjs.org); then
            PUBLISHED+=("${PACKAGE_NAME}@${PACKAGE_VERSION}")
          else
            echo "::error::Failed to publish ${PACKAGE_NAME}@${PACKAGE_VERSION}"
            FAILED+=("${PACKAGE_NAME}@${PACKAGE_VERSION}")
          fi
          echo "::endgroup::"
        done

        echo ""
        echo "Publish summary:"
        echo "  Published: ${#PUBLISHED[@]}"
        for p in "${PUBLISHED[@]}"; do echo "    - $p"; done
        echo "  Skipped:   ${#SKIPPED[@]}"
        for p in "${SKIPPED[@]}"; do echo "    - $p"; done
        echo "  Failed:    ${#FAILED[@]}"
        for p in "${FAILED[@]}"; do echo "    - $p"; done

        if [ "${#FAILED[@]}" -gt 0 ]; then
          echo "::error::${#FAILED[@]} package(s) failed to publish"
          exit 1
        fi
    - name: Bump Version
      if: "${{ inputs.type == 'bump' }}"
      shell: bash
      id: bumpversion
      run: |-
        ${GITHUB_ACTION_PATH}/node_modules/.bin/tsx \
        ${GITHUB_ACTION_PATH}/src/commands/bump-version.ts \
          --version ${{ inputs.bump }} --preId ${{ inputs.preId }} --dryRun=false


