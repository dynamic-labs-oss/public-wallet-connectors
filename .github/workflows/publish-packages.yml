name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or commit to publish. The ref must be a chore(release) commit
        default: main

jobs:
  publish:
    environment: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC
      contents: write
      actions: read
      deployments: write
      packages: write
      # Required when the workflow run was triggered by a commit that
      # modifies files under .github/workflows/. The Create a Release
      # REST endpoint then requires contents:write + workflows:write —
      # see https://docs.github.com/en/rest/releases/releases#create-a-release
      workflows: write
    steps:
      - name: Publish
        env:
          ACTIONS_RUNNER_DEBUG: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: dynamic-labs-oss/public-wallet-connectors/.github/actions/release@main
        with:
          type: publish
          ref: ${{ github.event.inputs.ref }}
